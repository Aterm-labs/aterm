<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Fuente del icono de marketplace (Open VSX / VS Marketplace). Se rasteriza
       a media/icon.png; regenera con scripts/build-icon.mjs si lo cambias. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b6dff"/>
      <stop offset="1" stop-color="#5b3fd6"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <!-- Bocadillo de chat (agente) -->
  <rect x="46" y="58" width="164" height="110" rx="26" fill="#ffffff"/>
  <path d="M84 158 L84 198 L124 158 Z" fill="#ffffff"/>
  <!-- Prompt de terminal: chevron > y cursor _ -->
  <polyline points="88,90 114,114 88,138" fill="none" stroke="#5b3fd6"
            stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="130" y1="138" x2="172" y2="138" stroke="#5b3fd6"
        stroke-width="13" stroke-linecap="round"/>
</svg>
